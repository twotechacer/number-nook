appId: com.anonymous.numbernook
---
# Flow: Play a bubbles game round (requires bubbles mechanic to be unlocked)
# Pre-condition: Bubbles must be unlocked on Floor 1 (3 feed correct in group 1_10)
# For fresh installs, this flow may not work without prior unlock progression

- launchApp

# Skip onboarding if shown
- tapOn:
    text: "Skip for now"
    optional: true

# Navigate to Floor 1
- tapOn:
    id: "floor-card-1"

# Check if bubbles is available
- assertVisible: "Pop the bubbles!"

# Tap bubbles mechanic (will only work if unlocked)
- tapOn:
    text: "Pop the bubbles!"
    optional: true

# If we get to the bubbles game screen
- assertVisible:
    text: "Pop the Bubbles"
    timeout: 3000
    optional: true

# The bubbles game should show popped counter
- assertVisible:
    text: "popped so far"
    optional: true

# Pop bubbles by tapping them
- tapOn:
    id: "bubble-0"
    optional: true
- tapOn:
    id: "bubble-1"
    optional: true
- tapOn:
    id: "bubble-2"
    optional: true
- tapOn:
    id: "bubble-3"
    optional: true
- tapOn:
    id: "bubble-4"
    optional: true
- tapOn:
    id: "bubble-5"
    optional: true
- tapOn:
    id: "bubble-6"
    optional: true
- tapOn:
    id: "bubble-7"
    optional: true
- tapOn:
    id: "bubble-8"
    optional: true
- tapOn:
    id: "bubble-9"
    optional: true

# After all popped, answer phase should appear
- assertVisible:
    text: "How many bubbles did you pop?"
    timeout: 5000
    optional: true
